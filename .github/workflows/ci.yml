name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        # The offline tests only need pytest + numpy (no torch/transformers,
        # no model download), so CI stays fast and network-free.
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy

      - name: Run tests
        run: pytest -q tests/
